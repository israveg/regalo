<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ---------------- BODY ---------------- */

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow-y:auto;
    overflow-x:hidden;

    padding:20px 0;

    font-family:'Quicksand', sans-serif;

    background:linear-gradient(
        135deg,
        #ff9a9e,
        #fecfef,
        #ffd6a5,
        #fff2cc
    );

    background-size:400% 400%;

    animation:bgMove 10s ease infinite;
}

/* ---------------- FONDO ---------------- */

@keyframes bgMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* ---------------- LOGIN SCREEN ---------------- */

.login-screen{

    position:absolute;

    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:100;

    padding:20px 0;
}

.login-card{

    background:white;

    width:90%;
    max-width:350px;

    max-height:90vh;

    overflow-y:auto;

    padding:40px 30px;

    border-radius:30px;

    text-align:center;

    box-shadow:
        0 20px 60px rgba(255,154,158,0.4);

    animation:fadeIn 1s ease;
}

.login-title{

    font-family:'Pacifico', cursive;

    font-size:2.2rem;

    color:#ff6b6b;

    margin-bottom:20px;
}

.login-input{

    width:100%;

    padding:15px;

    border:none;

    outline:none;

    border-radius:20px;

    background:#fff0f3;

    font-size:16px;

    text-align:center;

    margin-top:10px;

    box-sizing:border-box;
}

.login-btn{

    margin-top:20px;

    border:none;

    background:#ff6b6b;

    color:white;

    padding:14px 25px;

    border-radius:20px;

    cursor:pointer;

    font-size:16px;

    font-weight:bold;

    transition:0.3s;
}

.login-btn:hover{

    transform:scale(1.05);

    background:#ff8fab;
}

.error{

    color:#ff4d6d;

    margin-top:15px;

    display:none;

    font-weight:bold;
}

/* ---------------- ANIMACION ---------------- */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ---------------- TARJETA ---------------- */

.card{

    position:relative;

    z-index:10;

    width:90%;
    max-width:360px;

    max-height:90vh;

    overflow-y:auto;

    background:#ffffff;

    border-radius:30px;

    text-align:center;

    padding:40px 25px;

    border:4px solid white;

    box-shadow:
        0 20px 60px rgba(255,154,158,0.4),
        0 10px 20px rgba(0,0,0,0.05);

    transition:0.3s;

    display:none;

    animation:fadeIn 1s ease;
}

.card:hover{

    transform:translateY(-5px);
}

/* ---------------- TITULO ---------------- */

.title{

    font-family:'Pacifico', cursive;

    font-size:2.5rem;

    color:#ff6b6b;

    margin:0;

    text-shadow:
        2px 2px 0px #ffdde2;

    animation:
        bounce 2s infinite,
        glow 2s infinite alternate;
}

@keyframes bounce{

    0%,20%,50%,80%,100%{
        transform:translateY(0);
    }

    40%{
        transform:translateY(-10px);
    }

    60%{
        transform:translateY(-5px);
    }
}

@keyframes glow{

    from{
        text-shadow:
            0 0 10px #ff6b6b,
            0 0 20px #ff9a9e;
    }

    to{
        text-shadow:
            0 0 20px #ff6b6b,
            0 0 40px #ff9a9e;
    }
}

/* ---------------- NUMERO ---------------- */

.age-container{

    margin:20px auto 10px auto;

    background:#ff6b6b;

    color:white;

    display:block;

    width:fit-content;

    padding:8px 25px;

    border-radius:50px;

    font-family:'Fredoka One', sans-serif;

    font-size:2.3rem;

    letter-spacing:2px;

    box-shadow:
        0 5px 15px rgba(255,107,107,0.4);
}

/* ---------------- IMAGEN ---------------- */

.garfield{

    margin-top:25px;

    width:80%;
    max-width:230px;
    min-width:150px;

    height:auto;

    animation:float 2s ease-in-out infinite;

    transition:0.3s;

    filter:
        drop-shadow(
            0 10px 15px rgba(255,107,107,0.3)
        );
}

.garfield:hover{

    transform:
        scale(1.1)
        rotate(5deg);

    filter:
        drop-shadow(0 0 20px orange);
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* ---------------- MENSAJE ---------------- */

.message{

    margin-top:25px;

    font-size:1.2rem;

    color:#888;

    font-weight:700;

    background:#fff0f3;

    display:inline-block;

    padding:10px 20px;

    border-radius:20px;
}

/* ---------------- BOTON ---------------- */

.btn{

    margin-top:20px;

    border:none;

    background:#ff6b6b;

    color:white;

    padding:12px 22px;

    border-radius:20px;

    cursor:pointer;

    font-size:16px;

    font-family:'Quicksand', sans-serif;

    font-weight:bold;

    transition:0.3s;
}

.btn:hover{

    transform:scale(1.05);

    background:#ff8fab;
}

/* ---------------- CARTA ---------------- */

.carta{

    display:none;

    margin-top:20px;

    background:#fff0f3;

    padding:20px;

    border-radius:20px;

    color:#666;

    line-height:1.6;

    animation:fadeIn 0.5s ease;
}

/* ---------------- BURBUJAS ---------------- */

.bubble{
    position:absolute;
    bottom:-100px;
    background-color:rgba(255,255,255,0.2);
    border-radius:50%;
    animation:rise-up infinite ease-in;
    z-index:0;
}

@keyframes rise-up{

    0%{
        bottom:-10%;
        opacity:0;
        transform:translateX(0);
    }

    50%{
        opacity:0.5;
    }

    100%{
        bottom:120%;
        opacity:0;
        transform:translateX(-20px);
    }
}

/* ---------------- CONFETI ---------------- */

.confetti{
    position:absolute;
    top:-10px;
    z-index:20;
}

.confetti-1{
    left:10%;
    background:#ff6b6b;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:fall 3s linear infinite;
}

.confetti-2{
    left:30%;
    background:#ffd93d;
    width:8px;
    height:8px;
    animation:fall 4s linear infinite 1s;
}

.confetti-3{
    left:50%;
    background:#ff9f1c;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:fall 2.5s linear infinite 0.5s;
}

.confetti-4{
    left:70%;
    background:#ffb347;
    width:8px;
    height:8px;
    animation:fall 3.5s linear infinite 1.5s;
}

.confetti-5{
    left:90%;
    background:#ff7b00;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:fall 3s linear infinite 2s;
}

@keyframes fall{

    to{
        transform:
            translateY(600px)
            rotate(360deg);
    }
}

/* ---------------- LOGIN IMAGE ---------------- */

.login-img{

    width:120px;

    margin-bottom:20px;

    animation:floatLogin 2s ease-in-out infinite;

    filter:
        drop-shadow(
            0 10px 15px rgba(255,107,107,0.3)
        );
}

@keyframes floatLogin{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* ---------------- CORAZONES ---------------- */

.heart{

    position:absolute;

    bottom:-50px;

    font-size:25px;

    animation:hearts 6s linear infinite;

    opacity:0.7;

    z-index:1;
}

@keyframes hearts{

    0%{
        transform:
            translateY(0)
            scale(1);

        opacity:0;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:
            translateY(-900px)
            scale(1.5);

        opacity:0;
    }
}

/* ---------------- RESPONSIVE ---------------- */

@media(max-width:480px){

    .card{
        width:92%;
        padding:30px 15px;
    }

    .login-card{
        width:92%;
        padding:30px 20px;
    }

    .title{
        font-size:2rem;
    }

    .login-title{
        font-size:1.8rem;
    }

    .age-container{
        font-size:1.8rem;
        padding:6px 20px;
    }

    .message{
        font-size:1rem;
    }

    .btn,
    .login-btn{
        width:100%;
    }

    .garfield{
        width:85%;
    }

    .login-img{
        width:100px;
    }

    .carta{
        font-size:15px;
    }
}

/* ---------------- SCROLL BONITO ---------------- */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:#ffe5ec;
    border-radius:10px;
}

::-webkit-scrollbar-thumb{
    background:#ff8fab;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="loginScreen">

    <div class="login-card">

        <img
            src="felicitacion.jpg"
            class="login-img"
            alt="Imagen"
        >

        <div class="login-title">
            Enter your name 🧡
        </div>

        <input
            type="text"
            id="nombre"
            class="login-input"
            placeholder="Your name..."
        >

        <button
            class="login-btn"
            onclick="entrar()"
        >
            Open Surprise ✨
        </button>

        <div class="error" id="error">
            Access denied 🚫
        </div>

    </div>

</div>

<!-- BURBUJAS -->

<div class="bubble"
style="
width:50px;
height:50px;
left:10%;
animation-duration:8s;
">
</div>

<div class="bubble"
style="
width:30px;
height:30px;
left:30%;
animation-duration:12s;
animation-delay:2s;
">
</div>

<div class="bubble"
style="
width:60px;
height:60px;
left:70%;
animation-duration:10s;
animation-delay:4s;
">
</div>

<!-- CORAZONES -->

<div class="heart" style="left:10%;">❤️</div>

<div class="heart"
style="
left:25%;
animation-delay:1s;
">
🧡
</div>

<div class="heart"
style="
left:45%;
animation-delay:2s;
">
💛
</div>

<div class="heart"
style="
left:65%;
animation-delay:3s;
">
❤️
</div>

<div class="heart"
style="
left:85%;
animation-delay:4s;
">
🧡
</div>

<!-- TARJETA -->

<div class="card" id="birthdayCard">

    <!-- CONFETI -->

    <div class="confetti confetti-1"></div>
    <div class="confetti confetti-2"></div>
    <div class="confetti confetti-3"></div>
    <div class="confetti confetti-4"></div>
    <div class="confetti confetti-5"></div>

    <!-- TITULO -->

    <div class="title" id="titulo">
        Happy Birthday!
    </div>

    <!-- NUMERO -->

    <div class="age-container">
        53
    </div>

    <!-- IMAGEN -->

    <img
        src="feliz.jpg"
        class="garfield"
        alt="Garfield"
    >

    <!-- MENSAJE -->

    <div class="message" id="mensaje">
        MY LOVE 🧡
    </div>

    <!-- BOTON -->

    <button onclick="mostrarCarta()" class="btn">
        Open Letter 💌
    </button>

    <!-- CARTA -->

    <div id="carta" class="carta">

        Espero que este día sea tan especial
        como tú 🧡

        <br><br>

        Gracias por existir mama ✨

    </div>

</div>

<!-- SCRIPT -->

<script>

function mostrarCarta(){

    const carta =
        document.getElementById("carta");

    if(carta.style.display === "block"){

        carta.style.display = "none";

    }else{

        carta.style.display = "block";
    }
}

function entrar(){

    const nombre =
        document.getElementById("nombre").value;

    if(nombre.trim() === ""){

        document.getElementById("error")
        .style.display = "block";

        return;
    }

    document.getElementById("loginScreen")
    .style.display = "none";

    document.getElementById("birthdayCard")
    .style.display = "block";

    document.getElementById("titulo")
    .innerHTML =
        "Happy Birthday, " + nombre + "! 🎉";

    document.getElementById("mensaje")
    .innerHTML =
        "MY LOVE " + nombre + " 🧡";
}

</script>

</body>
</html>
